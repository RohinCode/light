<!doctype html>
<html lang="fa">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>light</title>
        <link rel="stylesheet" href="style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        />
    </head>
    <body>
        <div id="mother">
            <section id="sidebar">
                <div class="father">
                    <div class="container2">
                        <header>
                            <div class="top">
                                <h2>روهین</h2>
                            </div>
                            <div class="middle">
                                <input
                                    placeholder="جست‌وجو در گفت‌وگوها"
                                    type="text"
                                />
                            </div>
                            <div class="bottom">
                                <span class="active2">همه</span>
                                <span class="noActive">خوانده نشده</span>
                                <span class="noActive">انلاین</span>
                            </div>
                        </header>
                        <main class="chat-list">
                            <div class="adam">
                                <div id="w1">
                                    <span class="dot-online"></span>
                                    م.ن
                                </div>
                                <p>محسن نهالی</p>
                                <spaan class="time">5:12</spaan>
                            </div>
                            <div class="adam">
                                <div id="w2">
                                    ث.س
                                    <span class="dot-online"></span>
                                </div>
                                <p>ثریا سیسی</p>
                                <spaan class="time">16:34</spaan>
                            </div>
                            <div class="adam">
                                <div id="w3">ج.م</div>
                                <p>جمال محمدی</p>
                                <spaan class="time">دیروز</spaan>
                            </div>
                            <div class="adam">
                                <div id="w5">ا.ع</div>
                                <p>امیررضا عباسی</p>
                                <spaan class="time">چهارشنبه</spaan>
                            </div>
                            <div id="addFriend">
                                <p>اسم مخاطب را وارد کنید</p>
                                <input
                                    id="inpName"
                                    type="text"
                                    placeholder="type..."
                                />
                                <p>شماره‌ی مخاطب را وارد کنید</p>
                                <input
                                    id="inpNum"
                                    type="number"
                                    placeholder="09xxxxxxxxx"
                                />
                                <button id="add">ارسال</button>
                            </div>
                            <div id="plus">
                                <i class="fa-solid fa-plus"></i>
                            </div>
                            <div class="sidebar-foot">
                                <div
                                    class="avatar sm"
                                    style="
                                        background: linear-gradient(
                                            135deg,
                                            #3a6fa0,
                                            #0f2a47
                                        );
                                    "
                                >
                                    ر.ا
                                </div>
                                <div>
                                    <div class="name">رضا احمدی</div>
                                    <div class="sub">حساب من</div>
                                </div>
                                <div style="flex: 1"></div>
                                <button class="icon-botton" title="تنظیمات">
                                    <i class="fa-solid fa-gear"></i>
                                </button>
                            </div>
                        </main>
                        <footer></footer>
                    </div>
                </div>
            </section>

            <div id="container">
                <header>
                    <div class="header-left">
                        <button id="openMenuBtn" class="menu-btn">
                            <i class="fa-solid fa-bars"></i>
                        </button>

                        <div class="profile">
                            <img src="public/images/images.jpg" alt="Profile" />
                            <span id="name">Rohin</span>
                        </div>
                    </div>

                    <div class="header-right">
                        <button class="icon-btn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>

                        <button class="icon-btn">
                            <i class="fa-solid fa-phone"></i>
                        </button>

                        <button class="icon-btn">
                            <i class="fa-solid fa-ellipsis-vertical"></i>
                        </button>
                    </div>
                </header>

                <main>
                    <div class="message other">سلام</div>
                    <div class="message me">سلام، خوبی؟</div>
                    <div class="message other">آره ممنون</div>
                </main>

                <footer>
                    <textarea id="inputSms" placeholder="Typing..."></textarea>
                    <button id="send">
                        <svg
                            width="40"
                            height="40"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M21 4L2 10l7 2 9-7-5 8 7 2 1-11z"
                                fill="#fff"
                            />
                        </svg>
                    </button>
                </footer>
            </div>
        </div>
        <div id="sidebar-overlay"></div>
        <script src="script.js"></script>
    </body>
</html>
